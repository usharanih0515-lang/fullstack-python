version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: student_api_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=student_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Root@123
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: student_api_web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=student_db
      - DB_USER=postgres
      - DB_PASSWORD=Root@123
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_URL=postgres://postgres:Root@123@db:5432/student_db
      - SECRET_KEY=django-insecure-student-api-dev-key-change-this-in-production
    depends_on:
      - db

volumes:
  postgres_data:
