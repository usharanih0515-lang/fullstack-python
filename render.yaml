services:
  - type: web
    name: student-management-api
    runtime: docker
    rootDir: student_api
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString

databases:
  - name: student-db
    plan: free
    postgresDatabaseName: student_api_db
